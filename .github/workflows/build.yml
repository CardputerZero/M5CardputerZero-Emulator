name: Build Emulator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── macOS arm64 + x64 (matrix) ──────────────────────────────────────────────
  # ── macOS arm64 (static, ad-hoc signed, zip + dmg) ──────────────────────────
  # SDL2/Freetype/libpng are statically linked into cardputer-emu (see
  # EMU_MACOS_STATIC_DEPS in CMakeLists.txt) and SDL2_image is gone, so the
  # bundle ships NO third-party dylibs — only our own libAPPLaunch/libUserDemo.
  # Everything is ad-hoc codesigned and the quarantine xattr is stripped, so a
  # downloaded build opens without the "Apple cannot verify libSDL2_image…"
  # Gatekeeper prompt that used to fire 22 times (once per bundled dylib).
  #
  # arm64 only: Apple Silicon shipped in 2020; building x64 needs the slow,
  # frequently-1h+-queued macos-13 Intel runner. Build x64 offline if needed.
  macos-arm64:
    name: macos-arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          brew update >/dev/null
          brew install sdl2 freetype libpng pkg-config
      - name: Build (static deps)
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DEMU_MACOS_STATIC_DEPS=ON
          make -j$(sysctl -n hw.ncpu)
      - name: Assemble bundle + ad-hoc sign
        run: |
          set -euxo pipefail
          DIST=dist/M5CardputerZero-Emulator
          mkdir -p "$DIST"
          cp build/cardputer-emu "$DIST/"
          cp -r build/apps "$DIST/"
          cp -r build/assets "$DIST/"
          cp -r build/APPLaunch "$DIST/"

          # Sanity: the executable must carry no third-party dylib references.
          echo "== otool -L cardputer-emu =="
          otool -L "$DIST/cardputer-emu"
          if otool -L "$DIST/cardputer-emu" | grep -E '/opt/homebrew|/usr/local' ; then
            echo "::error::cardputer-emu still references Homebrew dylibs — static link failed"
            exit 1
          fi

          # Ad-hoc codesign every Mach-O so Gatekeeper sees a valid (if
          # unidentified) signature instead of "damaged / cannot verify".
          for f in "$DIST/cardputer-emu" "$DIST"/apps/*.dylib; do
            codesign --force --sign - --timestamp=none "$f"
            codesign --verify --verbose "$f"
          done
      - name: Package — green zip
        run: |
          set -euxo pipefail
          # Strip the quarantine xattr so first launch is prompt-free, then zip.
          xattr -cr dist/M5CardputerZero-Emulator
          (cd dist && zip -ry ../M5CardputerZero-Emulator-macOS-arm64.zip M5CardputerZero-Emulator)
      - uses: actions/upload-artifact@v4
        with:
          name: emulator-macos-arm64
          path: M5CardputerZero-Emulator-macOS-arm64.zip

  # ── Windows x64 (MinGW-w64) ────────────────────────────────────────────────
  windows:
    name: windows-x64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-winpthreads-git
            make
            git
            zip
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -G "MSYS Makefiles" -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
      - name: Bundle DLLs
        run: |
          set -euxo pipefail
          DIST=dist/M5CardputerZero-Emulator
          mkdir -p "$DIST"
          cp build/cardputer-emu.exe "$DIST/"
          cp -r build/apps      "$DIST/" 2>/dev/null || true
          cp -r build/assets    "$DIST/" 2>/dev/null || true
          cp -r build/APPLaunch "$DIST/" 2>/dev/null || true
          # Walk the dependency tree and copy every non-system DLL next to the exe.
          ldd build/cardputer-emu.exe | awk '/mingw64/ {print $3}' | while read -r dll; do
            cp "$dll" "$DIST/"
          done
          # Second pass for transitive deps of the copied DLLs.
          for dll in "$DIST"/*.dll; do
            ldd "$dll" 2>/dev/null | awk '/mingw64/ {print $3}' | while read -r d; do
              [ -f "$DIST/$(basename "$d")" ] || cp "$d" "$DIST/"
            done
          done
      - name: Package
        run: |
          cd dist && zip -rq ../M5CardputerZero-Emulator-Windows-x64.zip M5CardputerZero-Emulator
      - uses: actions/upload-artifact@v4
        with:
          name: emulator-windows-x64
          path: M5CardputerZero-Emulator-Windows-x64.zip

  # ── Linux x64 ───────────────────────────────────────────────────────────────
  linux:
    name: linux-x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-image-dev libfreetype-dev \
            libasound2-dev libinput-dev libxkbcommon-dev pkg-config
      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
      - name: Package
        run: |
          mkdir -p dist/M5CardputerZero-Emulator
          cp build/cardputer-emu dist/M5CardputerZero-Emulator/
          cp -r build/apps dist/M5CardputerZero-Emulator/
          cp -r build/assets dist/M5CardputerZero-Emulator/
          cp -r build/APPLaunch dist/M5CardputerZero-Emulator/
          cd dist && tar czf ../M5CardputerZero-Emulator-Linux-x64.tar.gz M5CardputerZero-Emulator
      - uses: actions/upload-artifact@v4
        with:
          name: emulator-linux-x64
          path: M5CardputerZero-Emulator-Linux-x64.tar.gz

  # ── Web (Emscripten/WASM) ───────────────────────────────────────────────────
  web:
    name: web-wasm
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.73
      - name: Build
        run: |
          mkdir build-web && cd build-web
          emcmake cmake .. -DCMAKE_BUILD_TYPE=Release
          emmake make -j$(nproc)
      - name: Package
        run: |
          mkdir -p dist-web
          cp build-web/index.html build-web/index.js build-web/index.wasm build-web/index.data dist-web/
          (cd dist-web && zip -rq ../M5CardputerZero-Emulator-Web.zip .)
          mkdir -p dist-playground/emulator
          cp web-playground/index.html dist-playground/
          cp build-web/index.html build-web/index.js build-web/index.wasm build-web/index.data dist-playground/emulator/
          (cd dist-playground && zip -rq ../M5CardputerZero-Playground.zip .)
      - uses: actions/upload-artifact@v4
        with:
          name: emulator-web
          path: M5CardputerZero-Emulator-Web.zip
      - uses: actions/upload-artifact@v4
        with:
          name: playground
          path: M5CardputerZero-Playground.zip

  # ── Pre-release (after every native + web build is green) ───────────────────
  release:
    needs: [macos-arm64, windows, linux, web]
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          TAG="dev-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA:0:7}"
          echo "Tag: $TAG"
          gh release create "$TAG" \
            --title "Dev Build $(date -u +%Y-%m-%d) (${GITHUB_SHA:0:7})" \
            --notes "Automated pre-release from commit ${GITHUB_SHA:0:7}

          **Downloads:**
          - macOS arm64: \`M5CardputerZero-Emulator-macOS-arm64.zip\`
          - Linux x64: \`M5CardputerZero-Emulator-Linux-x64.tar.gz\`
          - Windows x64 (MinGW): \`M5CardputerZero-Emulator-Windows-x64.zip\`
          - Web (WASM): \`M5CardputerZero-Emulator-Web.zip\`
          - Playground (hosted): \`M5CardputerZero-Playground.zip\`

          _macOS build is statically linked and ad-hoc signed — unzip and run, no Gatekeeper prompts._" \
            --prerelease \
            artifacts/emulator-macos-arm64/M5CardputerZero-Emulator-macOS-arm64.zip \
            artifacts/emulator-linux-x64/M5CardputerZero-Emulator-Linux-x64.tar.gz \
            artifacts/emulator-windows-x64/M5CardputerZero-Emulator-Windows-x64.zip \
            artifacts/emulator-web/M5CardputerZero-Emulator-Web.zip \
            artifacts/playground/M5CardputerZero-Playground.zip
